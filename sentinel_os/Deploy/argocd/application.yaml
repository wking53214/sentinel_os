# ArgoCD Application for the Iceberg / Sentinel OS deployment.
#
# Replaces the previous file at this path, which was not an ArgoCD resource at
# all -- it was a stray runtime-config block (server/governance/rl/telemetry)
# from the retired "Iceberg Runtime 3.x" generation.
#
# This is a multi-source Application: it deploys the minimal base (k8s/, a plain
# directory of manifests) together with the HA overlay (Deploy/k8s/, a Kustomize
# overlay adding HPA, Ingress, and PDB). Keeping the base in one place and
# layering extras on top means the two cannot drift apart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iceberg
  namespace: argocd
spec:
  project: default
  sources:
    # Base: Deployment, Service, PVC (applied as a plain directory of manifests).
    - repoURL: https://github.com/wking53214/sentinel_os.git
      targetRevision: main
      path: sentinel_os/k8s
    # HA overlay: HPA, Ingress, PDB (Kustomize, auto-detected via kustomization.yaml).
    - repoURL: https://github.com/wking53214/sentinel_os.git
      targetRevision: main
      path: sentinel_os/Deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: iceberg
  syncPolicy:
    # Pruning left OFF deliberately: automated deletion of resources that vanish
    # from git is disabled so a bad commit cannot tear down running
    # infrastructure. Sync applies and updates; removals are done manually.
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
