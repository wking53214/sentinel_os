apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iceberg-ingress
  labels:
    app: iceberg
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: iceberg.local
      http:
        paths:
          - path: /api/?(.*)
            pathType: Prefix
            backend:
              service:
                name: iceberg-api
                port:
                  number: 8000

          - path: /dashboard/?(.*)
            pathType: Prefix
            backend:
              service:
                name: iceberg-api
                port:
                  number: 8000

          - path: /rl/?(.*)
            pathType: Prefix
            backend:
              service:
                name: iceberg-rl
                port:
                  number: 9100

          - path: /sim/?(.*)
            pathType: Prefix
            backend:
              service:
                name: iceberg-sim-workers
                port:
                  number: 9000