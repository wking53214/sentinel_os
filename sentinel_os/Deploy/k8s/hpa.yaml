# Horizontal Pod Autoscaler for the base `iceberg` Deployment (k8s/deployment.yaml).
# Once active, this HPA manages the replica count, taking over from the base
# Deployment's static replicas value. The API server is stateless (all
# persistence is external Postgres), so horizontal scaling is safe.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iceberg-hpa
  namespace: iceberg
  labels:
    app: iceberg
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iceberg
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
