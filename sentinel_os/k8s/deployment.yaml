apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg
  namespace: iceberg
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iceberg
  template:
    metadata:
      labels:
        app: iceberg
    spec:
      securityContext:
        # Pod-level: enforced regardless of what the image's own USER
        # directive says, so a compromised/rebuilt image can't silently
        # start running as root.
        runAsNonRoot: true
        runAsUser: 1000   # matches the Dockerfile's `useradd --uid 1000 iceberg`
        runAsGroup: 1000
        fsGroup: 1000      # so the mounted PVC is writable by that uid
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: iceberg
        image: iceberg:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: ICEBERG_ENV
          value: production
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PORT
          value: "9090"
        # Previously unset entirely -- the app defaulted POSTGRES_HOST to
        # localhost, which inside a pod does not reach any database.
        # Point these at your actual Postgres (in-cluster Service or an
        # external managed instance); this manifest set does not include
        # a Postgres deployment of its own -- provision one separately.
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: iceberg
        - name: POSTGRES_USER
          value: iceberg
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: postgres-password
        # Restricted, non-superuser role the ledger actually connects as
        # for all reads/writes after startup (see ledger_immutability.sql
        # and PostgreSQLLedger's runtime_user/runtime_password). POSTGRES_USER
        # above stays privileged, but only for the one-time schema migration.
        # Optional so a deployment that hasn't provisioned ledger_reader yet
        # still starts (PostgreSQLLedger falls back to the schema-owner
        # credentials with a printed warning if these are unset).
        - name: ICEBERG_LEDGER_RUNTIME_USER
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: ledger-runtime-user
              optional: true
        - name: ICEBERG_LEDGER_RUNTIME_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: ledger-runtime-password
              optional: true
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: claude-api-key
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 4
            memory: 8Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: ledger
          mountPath: /data
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: ledger
        persistentVolumeClaim:
          claimName: iceberg-ledger-pvc
      - name: tmp
        emptyDir: {}
