apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg
  namespace: iceberg
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iceberg
  template:
    metadata:
      labels:
        app: iceberg
    spec:
      containers:
      - name: iceberg
        image: iceberg:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: ICEBERG_ENV
          value: production
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PORT
          value: "9090"
        # Previously unset entirely -- the app defaulted POSTGRES_HOST to
        # localhost, which inside a pod does not reach any database.
        # Point these at your actual Postgres (in-cluster Service or an
        # external managed instance); this manifest set does not include
        # a Postgres deployment of its own -- provision one separately.
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: iceberg
        - name: POSTGRES_USER
          value: iceberg
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: postgres-password
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: iceberg-secrets
              key: claude-api-key
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 4
            memory: 8Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: ledger
          mountPath: /data
      volumes:
      - name: ledger
        persistentVolumeClaim:
          claimName: iceberg-ledger-pvc
