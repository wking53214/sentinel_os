name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel_os

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # test_queue_identity_converter.py's ingress/worker pair expects an
      # already-running Redis on the default port (REDIS_URL =
      # "redis://localhost:6379/0"), unlike test_sentinel_worker.py /
      # test_rate_limiter_v2.py, which spawn their own redis-server
      # subprocess on custom ports and only need the binary (installed
      # below), not this service.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # anthropic 0.116.0 breaks on client construction with httpx>=0.28
          # ("unexpected keyword argument 'proxies'"). Pin below that line
          # until the anthropic SDK/httpx incompatibility is resolved upstream.
          pip install "httpx<0.28"
          # Static analysis -- see the ruff/bandit steps below for why these
          # currently report-only instead of gating the build.
          pip install ruff bandit

      - name: Install redis-server binary
        run: |
          # Several test files (test_sentinel_worker.py, test_rate_limiter_v2.py)
          # spawn their own redis-server subprocess on custom ports rather than
          # using the service above -- they need the binary on PATH, not a
          # separately-networked container.
          sudo apt-get update -qq
          sudo apt-get install -y -qq redis-server

      - name: Generate ephemeral TLS cert for tests
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/key.pem -out certs/cert.pem \
            -days 1 -subj "/CN=sentinel-ci-test"

      - name: Run test suite
        run: |
          # Full repo, not just Tests/ -- 9 of 10 root-level test_*.py files
          # (twin_custody, sentinel_worker, production_harness_breakers,
          # rate_limiter_v2, queue_identity_converter, circuit_breaker,
          # queue_schema, api_server_v2, grafts) were previously never
          # collected or run by CI at all; now they are.
          #
          # test_twin_live.py is explicitly excluded, not silently skipped:
          # it requires 3 separately-provisioned OS identities
          # (sentinelsvc/twincustomer/twincustodian), real TLS PKI between
          # them, and /usr/local/bin/twin_ensure_services -- a self-heal
          # script that exists in whatever environment originally built the
          # twin but was never committed to this repo. That's real
          # infrastructure to reconstruct, not a CI config fix -- tracked
          # separately, not blocking this merge.
          python -m pytest . --ignore=test_twin_live.py -v --tb=short

      - name: Summarize results
        if: always()
        run: |
          python -m pytest . --ignore=test_twin_live.py -q --tb=no || true

      - name: Lint (ruff, report-only)
        if: always()
        run: |
          # Report-only for now: 71 pre-existing findings as of this commit
          # (mostly unused imports/variables, a few multi-statement lines),
          # none security-relevant. Fix those separately, then flip this
          # step to a real gate (drop '|| true', or add
          # 'continue-on-error: false') so new lint debt can't land.
          ruff check . || true

      - name: Security scan (bandit, report-only)
        if: always()
        run: |
          # Report-only for now: current findings include one High-severity
          # issue (test_queue_identity_converter.py:58, subprocess with
          # shell=True and an interpolated f-string -- shell-injection-shaped,
          # test-only code but worth fixing) plus assorted Low/Medium items
          # (hardcoded test credentials, f-string SQL construction in a
          # test helper). This is exactly the class of issue that would
          # have auto-caught the TLS private key committed to git history
          # earlier -- bandit's B105/B106 hardcoded-secret checks flag that
          # pattern. Fix the current findings, then make this a real gate.
          bandit -r . -x ./Tests,./test_twin_live.py || true
