name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel_os

    services:
      # test_queue_identity_converter.py's ingress/worker pair expects an
      # already-running Redis on the default port (REDIS_URL =
      # "redis://localhost:6379/0"), unlike test_sentinel_worker.py /
      # test_rate_limiter_v2.py, which spawn their own redis-server
      # subprocess on custom ports and only need the binary (installed
      # below), not this service. Redis has no peer-auth-style identity
      # boundary to preserve, so a Docker service container (TCP) is fine
      # for it -- unlike Postgres, see below.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # anthropic 0.116.0 breaks on client construction with httpx>=0.28
          # ("unexpected keyword argument 'proxies'"). Pin below that line
          # until the anthropic SDK/httpx incompatibility is resolved upstream.
          pip install "httpx<0.28"
          # Static analysis -- see the ruff/bandit steps below for why these
          # currently report-only instead of gating the build.
          pip install ruff bandit

      - name: Install redis-server binary
        run: |
          # Several test files (test_sentinel_worker.py, test_rate_limiter_v2.py)
          # spawn their own redis-server subprocess on custom ports rather than
          # using the service above -- they need the binary on PATH, not a
          # separately-networked container.
          sudo apt-get update -qq
          sudo apt-get install -y -qq redis-server

      - name: "Install native Postgres (replaces the old services/postgres container)"
        run: |
          # test_twin_live.py's whole design depends on real peer auth: an
          # OS user (sentinelsvc/twincustomer/twincustodian) connecting to
          # Postgres over a Unix domain socket, with Postgres mapping that
          # OS identity directly to a same-named role -- no password, no
          # network hop. A `services: postgres: image: postgres:16`
          # Docker container is reachable only over TCP from this runner;
          # there is no Unix socket to share with it, so peer auth cannot
          # work against it no matter how the rest of this job is
          # configured. Installing Postgres natively on the runner itself
          # (same package, same default pg_hba.conf `local all all peer`
          # rule) gives the real shared socket instead -- the same setup
          # this repo's own dev containers use, verified locally to pass
          # the full suite (383/383) twice back-to-back from a clean state.
          sudo apt-get install -y -qq postgresql
          sudo service postgresql start
          # Match the iceberg/iceberg superuser + iceberg database every
          # DSN in this repo already assumes (same identity the old
          # Docker-container POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB
          # env vars provided).
          sudo -u postgres psql -c "CREATE ROLE iceberg WITH LOGIN SUPERUSER PASSWORD 'iceberg';"
          sudo -u postgres psql -c "CREATE DATABASE iceberg OWNER iceberg;"
          # Readiness check equivalent to the old service's --health-cmd
          # pg_isready, since there's no Docker healthcheck for a native
          # install to wait on.
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && break
            sleep 1
          done

      - name: Provision the twin live-suite's OS identities
        run: |
          # scripts/twin_ensure_services.sh is the same idempotent setup
          # this repo now documents for local/dev-container use -- three
          # OS identities (sentinelsvc, twincustomer, twincustodian), a
          # matching peer-auth Postgres role per identity, and sentinelsvc
          # granted into ledger_reader. Running it here means CI provisions
          # test_twin_live.py's infrastructure the identical way a human
          # would, rather than a CI-only special case.
          sudo install -m 0755 scripts/twin_ensure_services.sh /usr/local/bin/twin_ensure_services
          sudo /usr/local/bin/twin_ensure_services

      - name: Generate ephemeral TLS cert for tests
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/key.pem -out certs/cert.pem \
            -days 1 -subj "/CN=sentinel-ci-test"

      - name: Run test suite
        run: |
          # Full repo, NO exclusions -- test_twin_live.py's infrastructure
          # is now real, committed code (scripts/twin_ensure_services.sh,
          # provisioned above) and this job now has a native Postgres to
          # peer-auth against, so there is no remaining reason to exclude
          # it here. Runs as root (test_twin_live.py's own documented
          # assumption -- it uses `runuser` internally to drop into
          # sentinelsvc/twincustomer/twincustodian for the OS-identity
          # boundary tests; the pytest process itself needs root to do
          # that) with PATH preserved so it finds the packages installed
          # above.
          sudo -E env "PATH=$PATH" python -m pytest . -v --tb=short

      - name: Summarize results
        if: always()
        run: |
          sudo -E env "PATH=$PATH" python -m pytest . -q --tb=no || true

      - name: Lint (ruff)
        if: always()
        run: |
          # Real gate now: 73 pre-existing findings as of the previous
          # commit (mostly unused imports/variables, multi-statement
          # lines, import-order) are fixed -- 15 mechanically via `ruff
          # --fix`, the rest by hand, including 2 genuine bugs the F841
          # unused-variable check surfaced along the way (not just lint
          # noise): a test that tracked whether it found the /health
          # route but never asserted it, and a cycle-detection DFS whose
          # `visited` set was created but never actually used, meaning
          # any DAG with a shared descendant got needlessly re-explored.
          # Both fixed for real, not just silenced. Zero findings as of
          # this commit -- no `|| true` anymore, so new lint debt fails
          # the build instead of accumulating silently.
          ruff check .

      - name: Security scan (bandit)
        if: always()
        run: |
          # Real gate now, at Medium-and-above severity (`-ll`): both
          # High-severity findings from the previous commit are fixed for
          # real, not suppressed -- test_queue_identity_converter.py's
          # shell=True subprocess pipe was replaced with a native
          # redis-client scan+delete (eliminates the shell-injection-shaped
          # pattern entirely, doesn't just quiet the warning). The 17
          # Medium findings were individually reviewed and are all
          # legitimate/deliberate (0.0.0.0 binding for containerized
          # deployment, fixed-path /tmp scratch dirs in test-only or
          # explicitly-archived/simulator code, SQL string-interpolation
          # of fixed code-defined column lists or test-internal-only
          # values, never external input) -- each has an individual
          # `# nosec BXXX` with its own justification comment at the exact
          # line, not a blanket suppression. Gated at Medium+ rather than
          # every severity: the 541 remaining Low findings are dominated
          # by this repo's own test-credential conventions (e.g. the
          # local-only iceberg/iceberg and ledger_reader_test_pw
          # passwords used throughout the Postgres-backed test suite),
          # which bandit's B105/B106 will always flag as "possible
          # hardcoded password" -- a real, separate, much larger cleanup
          # (individually reviewing and justifying or restructuring
          # every one of those) than this pass took on. Gating at Medium+
          # still means nothing above test-credential noise can land
          # unreviewed, and is a real improvement over `|| true`
          # swallowing everything including the two High findings this
          # fixed.
          bandit -r . -x ./Tests -ll
